[pytest]
# =============================================================================
# pytest — Projeto Cidadão
# =============================================================================
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --strict-markers
    --strict-config
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=60
markers =
    slow: testes lentos (integração externa)
    integration: testes de integração (DB, Redis)
    unit: testes unitários puros
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
env =
    APP_ENV=test
    DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/projetocidadao_test
    REDIS_URL=redis://localhost:6379/15
    JWT_SECRET=test-secret-key-for-testing-only-32-chars
