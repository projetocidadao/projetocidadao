# =============================================================================
# Projeto Cidadão — Nginx site config
# =============================================================================

# Redireciona HTTP para HTTPS (descomente após configurar SSL)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

# HTTP (desenvolvimento) — comente a seção acima e use esta
server {
    listen 80;
    server_name _;

    # Logs
    access_log /var/log/nginx/pc_access.log;
    error_log /var/log/nginx/pc_error.log;

    # Segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Documentação Swagger
    location /docs {
        proxy_pass http://api:8000/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://api:8000/redoc;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://api:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # Arquivos de mídia (anexos)
    location /media/ {
        alias /var/www/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Health check direto
    location /health {
        proxy_pass http://api:8000/api/health;
        access_log off;
    }
}

