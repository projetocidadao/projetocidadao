name: projeto-cidadao

# =============================================================================
# Projeto Cidadão — Stack completa de desenvolvimento/produção
# =============================================================================
# Subir tudo:    docker-compose up -d
# Ver logs:      docker-compose logs -f api
# Derrubar:      docker-compose down
# Resetar dados: docker-compose down -v
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Banco de dados (Postgres + PostGIS)
  # ---------------------------------------------------------------------------
  db:
    image: postgis/postgis:15-3.4-alpine
    container_name: pc_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-projetocidadao}
      POSTGRES_USER: ${POSTGRES_USER:-cidadao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mudar123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cidadao} -d ${POSTGRES_DB:-projetocidadao}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pc_net

  # ---------------------------------------------------------------------------
  # Cache e filas (Redis)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pc_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - pc_net

  # ---------------------------------------------------------------------------
  # API (FastAPI)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pc_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cidadao}:${POSTGRES_PASSWORD:-mudar123}@db:5432/${POSTGRES_DB:-projetocidadao}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: ${APP_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "${API_PORT:-8000}:8000"
    command: ["./scripts/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - pc_net

  # ---------------------------------------------------------------------------
  # Nginx (reverse proxy + SSL)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: pc_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - media_data:/var/www/media:ro
    depends_on:
      - api
    networks:
      - pc_net

  # ---------------------------------------------------------------------------
  # Backup automático (cron diário)
  # ---------------------------------------------------------------------------
  backup:
    image: prodrigestivill/postgres-backup-local
    container_name: pc_backup
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-projetocidadao}
      POSTGRES_USER: ${POSTGRES_USER:-cidadao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mudar123}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./backups:/backups
    networks:
      - pc_net

# =============================================================================
# Volumes e redes
# =============================================================================
volumes:
  pgdata:
    name: pc_pgdata
  redisdata:
    name: pc_redisdata
  media_data:
    name: pc_media

networks:
  pc_net:
    name: pc_network
    driver: bridge
