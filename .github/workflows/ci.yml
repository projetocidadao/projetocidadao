name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Ruff
        working-directory: backend
        run: ruff check src/ tests/

      - name: Black check
        working-directory: backend
        run: black --check src/ tests/

  # ---------------------------------------------------------------------------
  # Testes
  # ---------------------------------------------------------------------------
  test:
    name: Testes (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4-alpine
        env:
          POSTGRES_DB: projetocidadao_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Habilitar PostGIS
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d projetocidadao_test \
            -c "CREATE EXTENSION IF NOT EXISTS postgis; CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"

      - name: Rodar testes
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/projetocidadao_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-for-testing-only-32-chars
          APP_ENV: test
        run: |
          pytest --tb=short --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ---------------------------------------------------------------------------
  # Build Docker
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: backend
        run: docker build -t projetocidadao-api:${{ github.sha }} .

      - name: Smoke test
        run: |
          docker run --rm -d --name test-api \
            -e DATABASE_URL=sqlite:///:memory: \
            -e JWT_SECRET=test \
            -p 8000:8000 \
            projetocidadao-api:${{ github.sha }} || true
          sleep 5
          docker stop test-api 2>/dev/null || true
